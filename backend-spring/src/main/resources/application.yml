server:
  port: 8080

spring:
  application:
    name: student-feedback-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/student_feedback_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

app:
  auth-token-secret: ${AUTH_TOKEN_SECRET:student-feedback-dev-secret}
  academic-base-url: ${ACADEMIC_BASE_URL:http://jwgl.sdust.edu.cn/app.do}
  academic-web-base-url: ${ACADEMIC_WEB_BASE_URL:https://jwgl.sdust.edu.cn/jsxsd/}
  academic-current-term: ${ACADEMIC_CURRENT_TERM:2025-2026-2}
  academic-term-start: ${ACADEMIC_TERM_START:2026-03-09}
